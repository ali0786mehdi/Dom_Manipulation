<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Greeting Page - DOM Manipulation</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #f4f7fc;
    }

    header {
      font-size: 2rem;
      font-weight: 600;
      color: #333;
      margin-bottom: 40px;
      transition: 0.3s ease;
    }

    .boxes {
      display: flex;
      gap: 20px;
      margin-bottom: 40px;
    }

    .box {
      width: 100px;
      height: 100px;
      border-radius: 10px;
      background-color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      font-weight: 600;
      font-size: 1.1rem;
      border: 2px solid #ccc;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .box:hover {
      transform: scale(1.05);
    }

    .input-section {
      display: flex;
      gap: 10px;
    }

    input {
      padding: 10px 15px;
      font-size: 1rem;
      border-radius: 8px;
      border: 1.5px solid #ccc;
      outline: none;
      width: 220px;
    }

    input:focus {
      border-color: #007bff;
    }

    button {
      padding: 10px 20px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 500;
      transition: background-color 0.3s ease;
    }

    button:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header id="greeting">Hello</header>

  <!-- Color Boxes -->
  <div class="boxes">
    <div class="box" id="redBox">Red</div>
    <div class="box" id="blueBox">Blue</div>
    <div class="box" id="greenBox">Green</div>
    <div class="box" id="yellowBox">Yellow</div>
  </div>

  <!-- Input and Button -->
  <div class="input-section">
    <input type="text" id="nameInput" placeholder="Enter your name">
    <button id="greetBtn">Greet</button>
  </div>

  <!-- JavaScript -->
  <script>
    // DOM Elements
    const greeting = document.getElementById("greeting");
    const nameInput = document.getElementById("nameInput");
    const greetBtn = document.getElementById("greetBtn");

    const redBox = document.getElementById("redBox");
    const blueBox = document.getElementById("blueBox");
    const greenBox = document.getElementById("greenBox");
    const yellowBox = document.getElementById("yellowBox");

    // Change greeting on button click
    greetBtn.addEventListener("click", () => {
      const name = nameInput.value.trim();
      if (name) {
        greeting.textContent = `Hello, ${name}!`;
      } else {
        greeting.textContent = "Hello";
        alert("Please enter your name first!");
      }
    });

    // Change box colors on click using DOM
    redBox.addEventListener("click", () => {
      redBox.style.backgroundColor = "red";
      redBox.style.color = "white";
    });

    blueBox.addEventListener("click", () => {
      blueBox.style.backgroundColor = "blue";
      blueBox.style.color = "white";
    });

    greenBox.addEventListener("click", () => {
      greenBox.style.backgroundColor = "green";
      greenBox.style.color = "white";
    });

    yellowBox.addEventListener("click", () => {
      yellowBox.style.backgroundColor = "yellow";
      yellowBox.style.color = "black";
    });
  </script>
</body>
</html>
