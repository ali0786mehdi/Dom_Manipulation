<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DOM Mastery Playground</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

:root{
    --primary:#4361ee;
    --bg:#f5f7ff;
    --card:#ffffff;
    --text:#222;
}

.dark{
    --bg:#121212;
    --card:#1e1e1e;
    --text:#ffffff;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Poppins,sans-serif;
}

body{
    min-height:100vh;
    background:var(--bg);
    color:var(--text);
    transition:.4s;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:40px;
}

h1{
    text-align:center;
    margin-bottom:30px;
    font-size:3rem;
}

.controls{
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:40px;
}

input{
    padding:12px;
    width:250px;
    border-radius:10px;
    border:none;
    outline:none;
}

button{
    padding:12px 20px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:var(--primary);
    color:white;
    font-weight:600;
}

.stats{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:20px;
    margin-bottom:30px;
}

.card{
    background:var(--card);
    padding:20px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:20px;
}

.box{
    height:150px;
    border-radius:15px;
    display:flex;
    justify-content:center;
    align-items:center;
    background:white;
    cursor:pointer;
    transition:.3s;
    font-weight:bold;
}

.box:hover{
    transform:translateY(-8px);
}

.log{
    margin-top:30px;
    background:var(--card);
    border-radius:15px;
    padding:20px;
    height:250px;
    overflow:auto;
}

.animate{
    animation:pop .5s ease;
}

@keyframes pop{
    0%{transform:scale(.5);}
    100%{transform:scale(1);}
}

</style>
</head>
<body>

<div class="container">

<h1 id="greeting">DOM Mastery Playground 🚀</h1>

<div class="controls">

<input
id="nameInput"
placeholder="Enter your name"
/>

<button id="greetBtn">
Greet
</button>

<button id="themeBtn">
Toggle Theme
</button>

<button id="resetBtn">
Reset
</button>

</div>

<div class="stats">

<div class="card">
<h2 id="clickCount">0</h2>
<p>Total Clicks</p>
</div>

<div class="card">
<h2 id="colorCount">0</h2>
<p>Colors Changed</p>
</div>

<div class="card">
<h2 id="timeDisplay">0</h2>
<p>Seconds Active</p>
</div>

</div>

<div class="grid" id="boxContainer"></div>

<div class="log">
<h3>Activity Log</h3>
<ul id="logs"></ul>
</div>

</div>

<script>

/* ===============================
   ADVANCED DOM PLAYGROUND
================================ */

/* STATE MANAGEMENT */

class AppState {

    constructor() {

        this.clicks =
            Number(localStorage.getItem("clicks")) || 0;

        this.colors =
            Number(localStorage.getItem("colors")) || 0;

        this.username =
            localStorage.getItem("username") || "";
    }

    save(){

        localStorage.setItem(
            "clicks",
            this.clicks
        );

        localStorage.setItem(
            "colors",
            this.colors
        );

        localStorage.setItem(
            "username",
            this.username
        );
    }

}

const state = new AppState();

/* DOM REFERENCES */

const greeting =
document.querySelector("#greeting");

const nameInput =
document.querySelector("#nameInput");

const greetBtn =
document.querySelector("#greetBtn");

const themeBtn =
document.querySelector("#themeBtn");

const resetBtn =
document.querySelector("#resetBtn");

const clickCount =
document.querySelector("#clickCount");

const colorCount =
document.querySelector("#colorCount");

const boxContainer =
document.querySelector("#boxContainer");

const logs =
document.querySelector("#logs");

const timeDisplay =
document.querySelector("#timeDisplay");

/* COLORS */

const colors = [
"red",
"green",
"blue",
"orange",
"purple",
"pink",
"teal",
"gold"
];

/* RENDER BOXES DYNAMICALLY */

function createBoxes(){

    const fragment =
    document.createDocumentFragment();

    colors.forEach(color=>{

        const div =
        document.createElement("div");

        div.classList.add("box");

        div.dataset.color = color;

        div.textContent =
        color.toUpperCase();

        fragment.appendChild(div);

    });

    boxContainer.appendChild(fragment);
}

createBoxes();

/* LOGGING SYSTEM */

function log(message){

    const li =
    document.createElement("li");

    li.textContent =
    `[${new Date().toLocaleTimeString()}] ${message}`;

    logs.prepend(li);

}

/* UPDATE UI */

function updateStats(){

    clickCount.textContent =
    state.clicks;

    colorCount.textContent =
    state.colors;

    state.save();
}

updateStats();

/* EVENT DELEGATION */

boxContainer.addEventListener("click",(e)=>{

    if(!e.target.classList.contains("box"))
        return;

    const color =
    e.target.dataset.color;

    e.target.style.background =
    color;

    e.target.style.color =
    "white";

    e.target.classList.add("animate");

    setTimeout(()=>{
        e.target.classList.remove("animate");
    },500);

    state.clicks++;
    state.colors++;

    updateStats();

    log(`Changed box color to ${color}`);

    document.dispatchEvent(
        new CustomEvent(
            "boxClicked",
            {
                detail:{color}
            }
        )
    );

});

/* CUSTOM EVENTS */

document.addEventListener(
    "boxClicked",
    (event)=>{

        console.log(
            "Custom Event Triggered:",
            event.detail.color
        );

    }
);

/* GREETING */

greetBtn.addEventListener(
"click",
()=>{

    const name =
    nameInput.value.trim();

    if(!name){

        alert(
            "Enter your name."
        );

        return;
    }

    state.username =
    name;

    greeting.textContent =
    `Welcome ${name} 🚀`;

    updateStats();

    log(
        `${name} logged in`
    );

}
);

/* THEME */

themeBtn.addEventListener(
"click",
()=>{

    document.body.classList.toggle(
        "dark"
    );

    localStorage.setItem(
        "theme",
        document.body.classList.contains("dark")
    );

}
);

/* RESTORE THEME */

if(
localStorage.getItem("theme")
==="true"
){
    document.body.classList.add("dark");
}

/* RESET */

resetBtn.addEventListener(
"click",
()=>{

    localStorage.clear();

    location.reload();

}
);

/* TIMER */

let seconds = 0;

setInterval(()=>{

    seconds++;

    timeDisplay.textContent =
    seconds;

},1000);

/* KEYBOARD SHORTCUTS */

document.addEventListener(
"keydown",
(e)=>{

    if(e.ctrlKey && e.key==="d"){

        e.preventDefault();

        document.body.classList.toggle(
            "dark"
        );

        log(
            "Theme changed using shortcut"
        );
    }

}
);

/* DEBOUNCING */

function debounce(
callback,
delay
){

    let timer;

    return (...args)=>{

        clearTimeout(timer);

        timer =
        setTimeout(
            ()=>callback(...args),
            delay
        );

    };
}

nameInput.addEventListener(
"input",
debounce((e)=>{

    console.log(
        "Typing:",
        e.target.value
    );

},500)
);

</script>

</body>
</html>
